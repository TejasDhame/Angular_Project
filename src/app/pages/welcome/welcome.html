
<mat-drawer-container
  class="example-container"
  hasBackdrop="True"
  autosize
  style="height: 100vh"
>
  <mat-drawer style="height: 100%" #drawer class="example-sidenav" mode="over">
    <h2
      class="expenseHeading"
      style="
        border-bottom: 2px solid red;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      "
      (dblclick)="onDoubleClick()"
      (touchstart)="onTouchStart()"
      (touchend)="onTouchEnd()"
      (touchmove)="onTouchCancel()"
    >
      Expense Tracker
    </h2>
    <div>
      <div>
        <div style="margin-top: 20px">
          <button mat-raised-button color="primary" disabled>
            <mat-icon>person</mat-icon>Single User Mode
          </button>
        </div>
      </div>
    </div>
    <div *ngIf="appVersion!=''" style="margin-top:20px;font-size:12px;">
      <p (copy)="false">Application Version: {{appVersion}}</p>
    </div>
  </mat-drawer>
  <div>
    <mat-toolbar style="border-bottom: 1px solid black">
      <button
        mat-icon-button
        class="example-icon"
        (click)="drawer.toggle()"
        aria-label="Example icon-button with menu icon"
      >
        <mat-icon>menu</mat-icon>
      </button>
      <span>Expense Tracker</span>
      <span class="example-spacer"></span>
      <button
        mat-mini-fab
        class="example-icon favorite-icon"
        aria-label="Example icon-button with heart icon"
        matTooltip="Single User Mode"
        disabled
      >
        <mat-icon>person</mat-icon>
      </button>
    </mat-toolbar>
  </div>
  <div>
    <div>
      <app-login></app-login>
    </div>
  </div>
</mat-drawer-container>
